<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freshwater Fish Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f7ff;
      padding: 20px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #0066cc;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .fish-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .fish-card:hover {
      transform: translateY(-5px);
    }
    .fish-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .fish-info {
      padding: 15px;
    }
    .fish-name {
      font-weight: bold;
      color: #0066cc;
      margin: 0 0 5px 0;
    }
    .fish-desc {
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <h1> freshwater Fish Gallery </h1>
  <div class="gallery">
    <div class="fish-card">
      <img src="https://via.placeholder.com/300x200?text=Guppy" alt="Guppy" class="fish-image" />
      <div class="fish-info">
        <h3 class="fish-name">Guppy</h3>
        <p class="fish-desc">Small, colorful, and easy to care for. Great for beginners.</p>
      </div>
    </div>
    <div class="fish-card">
      <img src="https://via.placeholder.com/300x200?text=Neon+Tetra" alt="Neon Tetra" class="fish-image" />
      <div class="fish-info">
        <h3 class="fish-name">Neon Tetra</h3>
        <p class="fish-desc">Bright blue and red stripes. Thrives in schools.</p>
      </div>
    </div>
    <div class="fish-card">
      <img src="https://via.placeholder.com/300x200?text=Angelfish" alt="Angelfish" class="fish-image" />
      <div class="fish-info">
        <h3 class="fish-name">Angelfish</h3>
        <p class="fish-desc">Tall, elegant, and peaceful. Needs taller tanks.</p>
      </div>
    </div>
    <div class="fish-card">
      <img src="https://via.placeholder.com/300x200?text=Discus" alt="Discus" class="fish-image" />
      <div class="fish-info">
        <h3 class="fish-name">Discus</h3>
        <p class="fish-desc">Colorful and shy. Requires stable water conditions.</p>
      </div>
    </div>
  </div>
</body>
</html>
